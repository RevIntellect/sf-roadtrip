# Static single-file site — no build step. Publish the repo root as-is.
[build]
  publish = "."
  command = ""

# Long-cache the inlined-image page is unnecessary; keep HTML revalidating.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
